<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F6F4EF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Radio">
  <title>Background Radio</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <script>
    // 在 CSS 应用前定好 data-theme,避免页面打开瞬间从 day 闪到 night
    (function () {
      try {
        const raw = localStorage.getItem("br.state");
        let theme = "auto";
        if (raw) {
          const s = JSON.parse(raw);
          if (s && (s.theme === "day" || s.theme === "night" || s.theme === "auto")) {
            theme = s.theme;
          }
        }
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_) {
        document.documentElement.setAttribute("data-theme", "auto");
      }
    })();
  </script>
</head>
<body>
  <div class="ambient"></div>

  <div class="shell">
    <header class="top-bar">
      <div class="status">
        <div id="status-track" class="status-track">Radio</div>
        <div id="status-scope" class="status-scope"></div>
      </div>
      <button id="menu-toggle" class="menu-btn" aria-label="菜单" title="菜单">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main>
      <section class="browser">
        <ul id="folder-list" class="entry-list">
          <li class="entry empty">未登录</li>
        </ul>
      </section>

      <section class="seek">
        <span id="pos-current" class="time">0:00</span>
        <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1" aria-label="进度" />
        <span id="pos-duration" class="time">0:00</span>
      </section>

      <section class="controls">
        <div class="ctrl-col">
          <button id="btn-rewind" class="ctrl-cell" title="回退 10s" aria-label="回退 10 秒">
            <span class="ctrl-glyph">«</span>
            <span class="ctrl-sub">10s</span>
          </button>
          <button id="btn-prev" class="ctrl-cell" title="上一首" aria-label="上一首">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="5" y="6" width="2" height="12"/>
              <polygon points="20,6 9,12 20,18"/>
            </svg>
          </button>
        </div>
        <button id="btn-play" class="ctrl-play-big paused" title="播放 / 暂停" aria-label="播放或暂停">
          <svg class="glyph-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8,5 20,12 8,19"/>
          </svg>
          <svg class="glyph-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="7" y="5" width="3.5" height="14"/>
            <rect x="13.5" y="5" width="3.5" height="14"/>
          </svg>
        </button>
        <div class="ctrl-col">
          <button id="btn-forward" class="ctrl-cell" title="前进 30s" aria-label="前进 30 秒">
            <span class="ctrl-glyph">»</span>
            <span class="ctrl-sub">30s</span>
          </button>
          <button id="btn-next" class="ctrl-cell" title="下一首" aria-label="下一首">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <polygon points="4,6 15,12 4,18"/>
              <rect x="17" y="6" width="2" height="12"/>
            </svg>
          </button>
        </div>
        <div class="vol-strip">
          <svg class="vol-icon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
            <path d="M3 9v6h4l5 4V5L7 9H3zm12 0v6c1.66 0 3-1.34 3-3s-1.34-3-3-3z"/>
          </svg>
          <input type="range" id="volume-bar" class="vol-vert" min="0" max="100" value="80" step="1"
                 orient="vertical" aria-label="音量" />
        </div>
      </section>
    </main>
  </div>

  <div id="menu-backdrop" class="menu-backdrop" aria-hidden="true"></div>
  <aside id="menu-drawer" class="menu-drawer" aria-hidden="true" aria-label="菜单">
    <header class="menu-head">
      <h2>菜单</h2>
      <button id="menu-close" class="menu-x" aria-label="关闭菜单">✕</button>
    </header>

    <section class="menu-section">
      <h3>账号</h3>
      <div id="user-name" class="user-name"></div>
      <div class="menu-row">
        <button id="btn-login" class="ghost">登录</button>
        <button id="btn-logout" class="ghost" hidden>登出</button>
      </div>
    </section>

    <section class="menu-section">
      <h3>主题</h3>
      <div class="loop-row">
        <label class="loop-opt">
          <input type="radio" name="theme" value="auto" checked> <span>跟随系统</span>
        </label>
        <label class="loop-opt">
          <input type="radio" name="theme" value="day"> <span>白金 · 日</span>
        </label>
        <label class="loop-opt">
          <input type="radio" name="theme" value="night"> <span>黑金 · 夜</span>
        </label>
      </div>
    </section>

    <section class="menu-section">
      <h3>循环模式</h3>
      <div class="loop-row">
        <label class="loop-opt">
          <input type="radio" name="loop" value="single"> <span>单曲</span>
        </label>
        <label class="loop-opt">
          <input type="radio" name="loop" value="folder" checked> <span>文件夹</span>
        </label>
        <label class="loop-opt">
          <input type="radio" name="loop" value="stop"> <span>放完停</span>
        </label>
      </div>
    </section>

    <section class="menu-section">
      <h3>本地缓存</h3>
      <div id="cache-info" class="cache-info">—</div>
      <div class="menu-row">
        <button id="btn-cache-clear" class="ghost">全部清除</button>
      </div>
    </section>

    <details class="menu-section menu-debug">
      <summary>Debug log</summary>
      <pre id="log"></pre>
    </details>
  </aside>

  <div id="update-toast" class="update-toast" hidden role="status" aria-live="polite">
    <span class="update-text">有新版本可用</span>
    <button id="btn-update-reload" class="ghost">刷新</button>
    <button id="btn-update-dismiss" class="ghost" aria-label="忽略">×</button>
  </div>

  <div id="tap-overlay" class="tap-overlay" hidden role="button" tabindex="0" aria-label="点击继续播放">
    <div class="tap-glyph">▶</div>
    <div id="tap-title" class="tap-title"></div>
    <div class="tap-hint">轻触屏幕继续</div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script type="module" src="app.js"></script>
</body>
</html>
